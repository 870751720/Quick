<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>代号：世界</title>
  <link rel="icon" href="favicon.svg?v=32" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=32">
  <link rel="stylesheet" href="confirm.css?v=32">
</head>
<body>
<main>
  <canvas id="game" width="1280" height="720"></canvas>
  <section id="main-menu" aria-label="主菜单">
    <div class="menu-art" aria-hidden="true"></div><div class="sun-haze" aria-hidden="true"></div>
    <div class="motes" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="menu-vignette"></div>
    <div class="title-block"><p class="eyebrow">A DARK FANTASY RPG</p><h1>代号：世界</h1><div class="title-rule"></div></div>
    <nav class="menu-actions"><button id="continue-game" type="button" hidden>继续游戏</button><button id="new-game" type="button">开始游戏</button><button id="open-settings" type="button">设置</button></nav>
    <p id="menu-hint" class="menu-hint">故事尚未开始</p><p class="build-mark">PROTOTYPE · 代号：世界</p>
  </section>
  <section id="new-game-confirm" class="modal hidden" aria-label="覆盖存档确认" aria-hidden="true">
    <div class="confirm-card"><p class="eyebrow">NEW JOURNEY</p><h2>重新开始旅程？</h2><p>现有旅程将被新的故事覆盖，且无法恢复。</p><div class="confirm-actions"><button id="cancel-new-game" type="button">返回</button><button id="confirm-new-game" class="danger" type="button">覆盖并开始</button></div></div>
  </section>
  <section id="settings-panel" class="modal hidden" aria-label="设置" aria-hidden="true"><div class="settings-card"><p class="eyebrow">SETTINGS</p><h2>设置</h2><label for="master-volume">总音量 <output id="volume-value">70%</output></label><input id="master-volume" type="range" min="0" max="100" value="70"><label class="toggle-row"><input id="mute-audio" type="checkbox"> 静音</label><button id="close-settings" type="button">返回</button></div></section>
</main>
<script type="module" src="src/game.js?v=32"></script>
</body>
</html>
